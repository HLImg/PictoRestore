data:
    train:
        name: PairDataSet
        param:
            lq_path: ~
            hq_path: ~
            down_scale: 1
            patch_size: 128
            aug_mode: ['flip', 'rot']
            read_mode: lmdb
    test:
        name: PairDataSet
        param:
            lq_path: ~
            hq_path: ~
            down_scale: 1
            patch_size: -1
            aug_mode: ~
            read_mode: lmdb

arch:
    net_g:
        name: NAFNet
        param:
            in_ch: 3
            num_feats: 64
            mid_blk_nums: 12
            enc_blk_nums: [2, 2, 4, 8]
            dec_blk_nums : [2, 2, 2, 2]
            blk_params:
                DW_Expand: 2
                FFN_Expand: 2
                drop_rate: 0.

model:
    ~

loss:
    l1:
        weight: 1.
        reduction: mean
    mse:
        weight: 2.
        reduction: mean

metric:
    psnr_rgb:
        crop_border: 0
        input_order: CHW
        test_y_channel: False
    ssim_rgb:
        crop_border: 0
        input_order: CHW
        test_y_channel: False




