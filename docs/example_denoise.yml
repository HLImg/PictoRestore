seed: 2017
a: !!float 2e6
exp_dir: results
run_name: nafnet-base

model:
    name: BaseModel
    batch_size: 4
    num_nodes: 1
    num_worker: 8
    val_freq: !!float 2e3
    save_freq: !!float 5e3
    iteration: 640000
    best_metric: psnr_rgb
    gradient_accumulation: 1
    optim:
        name: adam
        param:
            lr: 2.e-4
            weight_decay: 0.
            betas: [0.9, 0.99]
    schedule:
        name: cosine
        num_warmup_steps: 200
        num_training_steps: 640000

data:
    train:
        name: SynRGBNoise
        param:
            hq_path: /data/dataset/low_level/wed_data
            down_scale: 1
            patch_size: 128
            aug_mode: ['flip', 'rot']
            read_mode: disk
            data_type: uint8
            noise_clip: True
            noise_name: Gaussian
            noise_range: (5, 60, 5)
            noise_seed: 2018


    test:
        name: PairDataSet
        param:
            lq_path: /data/dataset/low_level/test_dataset/CBSD68/sigma50
            hq_path: /data/dataset/low_level/test_dataset/CBSD68/gt
            down_scale: 1
            patch_size: -1
            aug_mode: ~
            read_mode: disk

arch:
    net_g:
        name: NAFNet
        param:
            in_ch: 3
            num_feats: 64
            mid_blk_nums: 12
            enc_blk_nums: [2, 2, 4, 8]
            dec_blk_nums : [2, 2, 2, 2]
            blk_params:
                DW_Expand: 2
                FFN_Expand: 2
                drop_rate: 0.

loss:
    l1:
        weight: 1.
        reduction: mean


metric:
    psnr_rgb:
        crop_border: 0
        input_order: CHW
        test_y_channel: False
    ssim_rgb:
        crop_border: 0
        input_order: CHW
        test_y_channel: False