global:
  seed : 2017
  task : "denoise"
  action : 'train'
  dir_record :
    main_dir : ./exp
    main_name : RIR-SWIN-Base-gaussian-only-w
    sub_dir:
      runlog: runlog
      save_ckpt: save_ckpt
      resume_ckpt: resume_ckpt
      save_state: save_state
      best_ckpt : best_ckpt


dataset:
  task : 'denoise'
  name : 'syn_data'
  param:
    train :
      hq_path : /data/dataset/hsi/icvl_train.lmdb
      patch_size : 96
      scale : 1
      flip : False
      rotation: False
      noise_level: 30
      noise_clip: False
      noise_type: "blind-gaussian"

    test:
      hq_path: /data/dataset/hsi/icvl_test.lmdb
      noise_level: 50
      noise_clip: False
      noise_type: "gaussian"


loss:
  pixel :
    name : 'l1'
    param :
      loss_weight : 1.
      reduction : mean


net:
  task : 'denoise'
  net_g :
    name : 'rirswin'
    param:
      in_ch: 31
      num_feats: 96
      num_groups: [6, 6, 6, 6, 6, 6]
      head_dim: 32
      nw_size: 1
      sw_size: 8
      drop_rate: 0.1

model :
  task : 'denoise'
  name : 'hsi'

train:
  num_node : 1
  num_worker : 8
  batch_per_gpu : 3
  num_gpu_per_node : 8
  save_freq : !!float 5e3
  print_freq : 200
  total_iters : !!float 2e5
  init:
    state : False
    name : ~
  resume:
    state: False
    mode: 'net'
    model: ~
  optim:
    optimizer:
      name : 'AdamW'
      param :
        lr : 2.e-4
        weight_decay : 0.
        betas : [0.9, 0.99]
    scheduler:
      name : 'CosineAnnealingLR'
      param :
        T_max : 6400000 # 单卡 8e5 x 8 (gpu个数)
        eta_min : 1.e-7

val:
  val_freq : !!float 2e3
  metric:
    name: image
    param:
      psnr:
        crop_border: 0
        input_order: 'HWC'
        test_y_channel: False
      ssim:
        crop_border: 0
        input_order: 'HWC'
        test_y_channel: False
      sam:
        crop_border: 0